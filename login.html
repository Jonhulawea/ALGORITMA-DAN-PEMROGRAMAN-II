<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login SIMTI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0f0517,
    #1a0827,
    #250d35
    );

    color:white;
}

.login-box{

    width:420px;

    padding:40px;

    border-radius:25px;

    background:
    rgba(255,255,255,.05);

    backdrop-filter:blur(15px);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:
    0 10px 40px rgba(255,79,163,.15);
}

.logo{

    text-align:center;

    margin-bottom:30px;
}

.logo-icon{

    width:80px;
    height:80px;

    margin:auto;

    border-radius:20px;

    background:
    linear-gradient(
    135deg,
    #ff4fa3,
    #d946ef
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:35px;

    box-shadow:
    0 0 30px rgba(255,79,163,.4);
}

.logo h1{

    margin-top:15px;
}

.logo p{

    color:#c9b6dd;
}

.form-group{

    margin-bottom:18px;
}

.form-group label{

    display:block;

    margin-bottom:8px;

    color:#d6c9e4;
}

.form-group input{

    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:12px;

    background:
    rgba(255,255,255,.08);

    color:white;
}

.form-group input::placeholder{

    color:#aaa;
}

.btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;
    font-weight:600;

    color:white;

    background:
    linear-gradient(
    135deg,
    #ff4fa3,
    #d946ef
    );

    transition:.3s;
}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 20px rgba(255,79,163,.4);
}

.error{

    background:
    rgba(255,0,0,.15);

    color:#ff9c9c;

    padding:12px;

    border-radius:10px;

    margin-bottom:15px;
}

.footer{

    text-align:center;

    margin-top:20px;

    color:#c9b6dd;
}

.footer a{

    color:#ff7ab8;

    text-decoration:none;
}

</style>

</head>
<body>

<div class="login-box">

<div class="logo">

    <div class="logo-icon">
        🎓
    </div>

    <h1>SIMTI</h1>

    <p>
        Sistem Informasi Mahasiswa Teknik Informatika
    </p>

</div>

{% if error %}

<div class="error">
    {{ error }}
</div>

{% endif %}

<form method="POST">

    <div class="form-group">

        <label>NIM</label>

        <input
        type="text"
        name="nim"
        placeholder="Masukkan NIM"
        required>

    </div>

    <div class="form-group">

        <label>Password</label>

        <input
        type="password"
        name="password"
        placeholder="Masukkan Password"
        required>

    </div>

    <button type="submit" class="btn">

        <i class="fa fa-right-to-bracket"></i>
        Login

    </button>

</form>

<div class="footer">

    © 2026 SIMTI - Sistem Informasi Mahasiswa Teknik Informatika

</div>

</div>

</body>
</html>
